name: Pages

# Dynamic Harness — 自動部署 coverage HTML report 到 GitHub Pages
#
# 觸發條件：
#   1. push 到 main（成功時自動部署）
#   2. workflow_dispatch（手動觸發）
#
# 部署位置：
#   https://<owner>.github.io/<repo>/
#
# 設定步驟（一次性）：
#   1. GitHub repo → Settings → Pages
#   2. Source: "GitHub Actions"（不是 "Deploy from a branch"）
#   3. 第一次 push 觸發後會自動建立 Pages site

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'tests/**'
      - 'requirements*.txt'
      - 'scripts/install.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# 同類型 workflow 序列化執行（避免 gh-pages race condition）
concurrency:
  group: pages
  cancel-in-progress: false

# 部署 job 需要寫入權限（不需很高，contents: write 就夠）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ============================================================
  # Job 1: 跑測試 + 產生 coverage HTML
  # ============================================================
  build:
    name: Build coverage report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # pytest + pytest-cov 已在 requirements-dev.txt 裡

      - name: Run tests with coverage
        run: |
          mkdir -p htmlcov
          python -m pytest tests/ \
            --cov=. \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            --cov-report=term:skip-covered \
            --tb=short

      - name: Generate coverage badge
        if: success()
        run: |
          # 從 coverage.xml 抽出總百分比，產生 shields.io 動態 badge URL
          # （不直接存 PNG，避免在 Pages 放 SVG 會有快取問題）
          COV=$(python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          print(f'{float(root.attrib[\"line-rate\"])*100:.1f}')
          ")
          echo "COVERAGE=${COV}%" >> $GITHUB_ENV
          echo "Coverage: ${COV}%"

      - name: Add badge to index.html
        if: success()
        run: |
          # 注入 README + badge 到 coverage 首頁，讓 Pages 不只是冷冰冰的數字
          cat > htmlcov/index.md <<'EOF'
          # Dynamic Harness — Coverage Report

          ![coverage](https://img.shields.io/badge/coverage-${COVERAGE}-brightgreen)

          **Latest coverage:** ${COVERAGE}

          ## How to read this report

          - Click any file in the list below to see line-by-line coverage
          - Red = not executed, Green = executed
          - Hover over a line to see how many times it ran

          ## Local reproduction

          ```bash
          make coverage
          open htmlcov/index.html
          ```

          ## CI source

          This report is auto-generated by `.github/workflows/pages.yml` on every push to `main`.

          ---
          EOF
          # 把 markdown 轉成簡單 HTML，插在 coverage 前面
          python <<'PYEOF'
          import html
          with open('htmlcov/index.md') as f:
              md = f.read()
          # 極簡 markdown 轉 HTML（只支援 # / ! / ** / ``` / 空行）
          lines = md.split('\n')
          out = ['<!DOCTYPE html><html><head><meta charset="utf-8">']
          out.append('<link rel="stylesheet" href="style.css">')
          out.append('<title>Dynamic Harness Coverage</title>')
          out.append('<style>body{font-family:-apple-system,system-ui,sans-serif;max-width:900px;margin:2em auto;padding:0 1em;line-height:1.6;color:#24292f} h1{border-bottom:1px solid #d1d9e0;padding-bottom:.3em} pre{background:#f6f8fa;padding:1em;border-radius:6px;overflow:auto} code{font-family:ui-monospace,SF Mono,monospace;font-size:90%}</style>')
          out.append('</head><body>')
          in_code = False
          for line in lines:
              if line.startswith('```'):
                  if in_code:
                      out.append('</pre>')
                      in_code = False
                  else:
                      out.append('<pre><code>')
                      in_code = True
              elif in_code:
                  out.append(html.escape(line))
              elif line.startswith('# '):
                  out.append(f'<h1>{html.escape(line[2:])}</h1>')
              elif line.startswith('!['):
                  # ![alt](url) → <img>
                  alt, url = line[2:].split('](', 1)
                  url = url.rstrip(')')
                  out.append(f'<p><img src="{html.escape(url)}" alt="{html.escape(alt)}"></p>')
              elif line.startswith('## '):
                  out.append(f'<h2>{html.escape(line[3:])}</h2>')
              elif line.strip() == '---':
                  out.append('<hr>')
              elif line.strip() == '':
                  out.append('<p>')
              else:
                  # **bold** 簡單處理
                  import re
                  line = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', line)
                  out.append(f'<p>{line}</p>')
          out.append('</body></html>')
          with open('htmlcov/_index_wrapper.html', 'w') as f:
              f.write('\n'.join(out))
          PYEOF
          # 把 wrapper 放到 htmlcov/_coverage_landing.html（保留原始 index.html 給 coverage.py 自己用）
          mv htmlcov/_index_wrapper.html htmlcov/landing.html

      - name: Copy README to pages root
        if: success()
        run: |
          # 把 README.md 複製成 index.html（訪問根 URL 時看到的）
          if [ -f README.md ]; then
            cp README.md htmlcov/README.md
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: htmlcov/

  # ============================================================
  # Job 2: 部署到 GitHub Pages
  # ============================================================
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
